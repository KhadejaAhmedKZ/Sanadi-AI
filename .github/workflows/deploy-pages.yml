name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Modern Pages deployment: build → upload artifact → deploy-pages.
# (Previously published to a gh-pages branch for GitHub's legacy builder,
# but that builder started failing with an opaque "Page build failed";
# the artifact-based deployment bypasses it entirely.)
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        env:
          # Repo variable pointing at the Render backend URL, e.g.
          # https://sanadi-ai-backend.onrender.com
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
